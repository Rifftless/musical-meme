<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Remote | Control Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg-dark: #020617;
            --surface: #0f172a;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 1rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            display: flex; align-items: center; gap: 0.75rem;
            font-weight: 600; font-size: 1.2rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        main {
            flex: 1; display: flex; overflow: hidden;
        }

        #viewport-container {
            flex: 1; position: relative;
            display: flex; justify-content: center; align-items: center;
            padding: 1rem; background: radial-gradient(circle at center, #1e293b, #020617);
        }

        #screen-canvas {
            max-width: 100%; max-height: 100%;
            border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            cursor: crosshair; background: #000;
        }

        /* Power Tools Sidebar */
        #sidebar {
            width: 320px; background: var(--surface);
            border-left: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column; padding: 1.5rem;
            gap: 1.5rem; overflow-y: auto;
        }

        h2 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }

        .btn {
            padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03); color: var(--text-main);
            cursor: pointer; text-align: center; font-size: 0.85rem; transition: 0.2s;
        }
        .btn:hover { background: rgba(56, 189, 248, 0.1); border-color: var(--accent); }
        .btn.active { background: var(--danger); border-color: var(--danger); }

        /* Process Manager */
        #proc-list {
            flex: 1; display: flex; flex-direction: column; gap: 0.5rem;
        }
        .proc-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.6rem; background: rgba(255,255,255,0.02);
            border-radius: 6px; font-size: 0.75rem;
        }
        .proc-item:hover { background: rgba(255,255,255,0.05); }
        .kill-btn { color: var(--danger); cursor: pointer; font-weight: bold; padding: 0.2rem 0.5rem; }

        .overlay-info {
            position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
            padding: 0.5rem 1rem; background: rgba(0,0,0,0.6); border-radius: 20px;
            font-size: 0.7rem; color: #94a3b8; pointer-events: none;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">ANTIGRAVITY REMOTE</div>
        <div id="status-badge" style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem;">
            <div id="indicator" style="width: 8px; height: 8px; border-radius: 50%; background: var(--danger);"></div>
            <span id="status-text">OFFLINE</span>
        </div>
    </header>

    <main>
        <div id="viewport-container">
            <canvas id="screen-canvas"></canvas>
            <div class="overlay-info">DRAG to move items • RIGHT CLICK for menu • SCROLL to zoom/scroll</div>
        </div>

        <div id="sidebar">
            <h2>System Power</h2>
            <button id="lock-btn" class="btn">Lock Host Input</button>
            <button id="p-refresh" class="btn">Refresh Processes</button>

            <h2>Process Manager</h2>
            <div id="proc-list">
                <div style="color: var(--text-dim); font-size: 0.8rem; text-align: center;">Click refresh to list</div>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        const canvas = document.getElementById('screen-canvas');
        const ctx = canvas.getContext('2d');
        const lockBtn = document.getElementById('lock-btn');
        const procList = document.getElementById('proc-list');
        const pRefresh = document.getElementById('p-refresh');

        let isLocked = false;
        let isMouseDown = false;

        socket.on('connect', () => {
            socket.emit('identify', 'client');
            document.getElementById('indicator').style.background = 'var(--success)';
            document.getElementById('status-text').innerText = 'CONNECTED';
        });

        socket.on('screen_frame', (data) => {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
            };
            img.src = 'data:image/jpeg;base64,' + data;
        });

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            return { x: (e.clientX - rect.left) / rect.width, y: (e.clientY - rect.top) / rect.height };
        }

        // Advanced Mouse Events (Drag support)
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            const pos = getPos(e);
            socket.emit('control_event', { type: 'mousedown', ...pos, button: e.button === 0 ? 'left' : 'right' });
        });

        window.addEventListener('mouseup', (e) => {
            if (!isMouseDown) return;
            isMouseDown = false;
            const pos = getPos(e);
            socket.emit('control_event', { type: 'mouseup', ...pos, button: e.button === 0 ? 'left' : 'right' });
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getPos(e);
            socket.emit('control_event', { type: 'move', ...pos });
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            socket.emit('control_event', { type: 'scroll', delta: e.deltaY * -1 });
        }, { passive: false });

        canvas.addEventListener('dblclick', (e) => {
            const pos = getPos(e);
            socket.emit('control_event', { type: 'click', ...pos, clicks: 2 });
        });

        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // Keyboard
        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            socket.emit('control_event', { 
                type: 'key', key: e.key, shift: e.shiftKey, ctrl: e.ctrlKey, alt: e.altKey 
            });
            if (e.key.length > 1) e.preventDefault();
        });

        // Power Tools
        lockBtn.onclick = () => {
            isLocked = !isLocked;
            lockBtn.classList.toggle('active', isLocked);
            lockBtn.innerText = isLocked ? 'Unlock Host Input' : 'Lock Host Input';
            socket.emit('control_event', { type: 'lock_host', locked: isLocked });
        };

        pRefresh.onclick = () => {
            procList.innerHTML = '<div style="text-align:center">Refreshing...</div>';
            socket.emit('control_event', { type: 'get_procs' });
        };

        socket.on('process_list', (procs) => {
            procList.innerHTML = '';
            procs.forEach(p => {
                const div = document.createElement('div');
                div.className = 'proc-item';
                div.innerHTML = `
                    <div style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px;">
                        <b>[${p.pid}]</b> ${p.name}
                    </div>
                    <div style="display:flex; gap:0.5rem; align-items:center;">
                        <span style="color:var(--accent)">${p.cpu}%</span>
                        <span class="kill-btn" data-pid="${p.pid}">✕</span>
                    </div>
                `;
                procList.appendChild(div);
            });
        });

        procList.onclick = (e) => {
            if (e.target.classList.contains('kill-btn')) {
                const pid = parseInt(e.target.dataset.pid);
                if (confirm(`Kill process ${pid}?`)) {
                    socket.emit('control_event', { type: 'kill_proc', pid });
                    setTimeout(() => pRefresh.click(), 500);
                }
            }
        };
    </script>
</body>

</html>
